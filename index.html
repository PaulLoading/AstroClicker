<!DOCTYPE html>
<html>
  <head>
    <title>We are so Kirk</title>
    <link rel="stylesheet" href="style.css">
    <script>
      let stardust = 0;
      let starLevel = 1
      
      function addStardust() {
        stardust += starLevel
	      document.getElementById("stardustView").textContent=stardust
      }
      
      function levelUp() {
        if (stardust >= 100) {//co the thay cai 100 thanh so khac, trung voi cai so o duoi cho stardust -= xxx
          starLevel += 1
          stardust -= 100
          document.getElementById("stardustView").textContent=stardust
          document.getElementById("SPS").textContent=starLevel
        } else {
          alert("Your stardusts aren't enough ngga")
        }
      }
    </script>
  </head>
  <body>
	<header>
		<ul class="navbar">
			<li class="navitem"><a class="navlink" href="#">A.I.I</a></li>
			<li class="navitem"><a class="navlink" href="#">idk</a></li>
		</ul>
	</header>
	<div>
    	<button id="click" onclick = "addStardust()"><img src="sun.png"></button>
      <button id="click" onclick = "levelUp()"></button>
	</div>
    <p id="stardustView">0</p>
    <p>Stardust per click: </p><p id="SPS">1</p>
  </body>
</html>
